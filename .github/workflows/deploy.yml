name: Deploy

# Deploys imdb-browser on every push to main (IMDB-12), mirroring
# dperez4787/linear-example's deploy.yml — the settled convention for this stack.
#
# Auth is OIDC-only via Workload Identity Federation: each job mints a GitHub
# OIDC token (which requires `id-token: write`, below) and google-github-actions/auth
# exchanges it for short-lived deploy-SA credentials
# (imdb-browser-deploy@…, provider github-provider-imdbbrowser — see
# docs/architecture.md § GCP provisioning). No service-account key exists anywhere.
# The chat image is built from app/chat/Dockerfile on the runner and pushed to
# Artifact Registry — tagged by commit SHA, never `latest`, so a rollback always
# resolves to the exact bytes it originally deployed.
#
# Job ordering: the SPA bakes the chat backend's URL into the bundle at build time
# (Vite inlines VITE_CHAT_URL), so `frontend` needs `chat` and reads the deployed
# service URL with `gcloud run services describe` — see the comment on that step.

on:
  push:
    branches: [main]

jobs:
  chat:
    name: Build, push, and deploy chat backend
    runs-on: ubuntu-latest

    # id-token: write is mandatory — without it the OIDC token is never minted and
    # the WIF exchange in google-github-actions/auth fails at runtime.
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: project-d60a83c1-2c60-4d51-ad0
      REGION: us-central1
      SERVICE: imdb-browser-chat
      RUNTIME_SA: imdb-browser-run@project-d60a83c1-2c60-4d51-ad0.iam.gserviceaccount.com
      IMAGE: us-central1-docker.pkg.dev/project-d60a83c1-2c60-4d51-ad0/imdb-browser/chat:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC / Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build chat image
        run: docker build -f app/chat/Dockerfile -t "$IMAGE" app/chat

      - name: Push chat image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run
        # The service is CI-owned: this step creates it on the first run and updates
        # it thereafter (docs/architecture.md — never hand-provisioned).
        # --allow-unauthenticated is explicit and by design: gcloud in a
        # non-interactive shell would otherwise create a brand-new service private,
        # and the SPA calls this service directly from the browser. Authentication
        # is APPLICATION-level — the backend verifies the caller's Firebase ID token
        # before anything reaches Anthropic (IMDB-10) — so Google's front end must
        # let requests through.
        # ANTHROPIC_API_KEY comes from Secret Manager via --set-secrets; it is never
        # present in this file, the repo, or the image. The runtime SA holds a
        # secret-scoped accessor role on exactly that secret.
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --service-account="$RUNTIME_SA" \
            --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest \
            --allow-unauthenticated

  frontend:
    name: Build and deploy frontend to Firebase Hosting
    runs-on: ubuntu-latest

    # Ordering decision (VITE_CHAT_URL): Vite inlines env vars at build time, so the
    # SPA bundle must know the chat backend's URL before `npm run build` runs. Rather
    # than hardcoding a URL that doesn't exist until the first chat deploy, this job
    # depends on `chat` and asks Cloud Run for the live service URL (see the
    # "Resolve chat backend URL" step). That makes the very first deploy correct with
    # no manual bootstrap — by the time this job runs, `gcloud run deploy` in the
    # chat job has already created the service — and stays correct if the URL ever
    # changes, at the cost of serializing the two jobs.
    needs: chat

    # Permissions are per-job, not inherited from the chat job above. id-token: write
    # is mandatory — without it the GitHub OIDC token is never minted and the WIF
    # exchange in google-github-actions/auth fails at runtime. actionlint does NOT
    # catch a missing id-token permission, so it is spelled out here deliberately.
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: project-d60a83c1-2c60-4d51-ad0
      REGION: us-central1
      CHAT_SERVICE: imdb-browser-chat
      # Pinned to an exact firebase-tools version — never a floating tag or @latest —
      # so a CLI release can't silently change deploy behavior between runs. 11.30 is
      # the floor that added ADC support for Hosting; 13.29.2 is the same published
      # release linear-example pins.
      FIREBASE_TOOLS_VERSION: 13.29.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Matches the repo's Node pin (.nvmrc = 24), the same LTS the app is built on.
          node-version-file: .nvmrc

      - name: Authenticate to Google Cloud (OIDC / Workload Identity Federation)
        # Runs BEFORE the build (unlike linear-example, where auth follows the build)
        # because the next step needs gcloud credentials to resolve the chat URL that
        # feeds the build. Exports a short-lived ADC credential-config file and sets
        # GOOGLE_APPLICATION_CREDENTIALS to point at it; the firebase CLI later reads
        # ADC from that same env var — no FIREBASE_TOKEN, no key file anywhere.
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve chat backend URL
        # Single source of truth for the URL is Cloud Run itself — the chat job in
        # this same run has already created/updated the service (needs: chat).
        id: chat-url
        run: |
          CHAT_URL=$(gcloud run services describe "$CHAT_SERVICE" \
            --region "$REGION" --project "$PROJECT_ID" \
            --format 'value(status.url)')
          test -n "$CHAT_URL" || { echo "empty chat service URL"; exit 1; }
          echo "Chat backend URL: $CHAT_URL"
          echo "url=$CHAT_URL" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Build the SPA
        working-directory: app/frontend
        env:
          VITE_CHAT_URL: ${{ steps.chat-url.outputs.url }}
        run: npm run build

      - name: Install firebase-tools (exact pin)
        run: npm install -g firebase-tools@"$FIREBASE_TOOLS_VERSION"

      - name: Deploy to Firebase Hosting
        # Run from the repo ROOT — this is where firebase.json lives and where its
        # `public: app/frontend/dist` path resolves. The deploy targets ONLY the named
        # hosting target `dfp-imdb-browser` (mapped to the site of the same name in
        # .firebaserc): the project's DEFAULT site serves linear-example and must
        # never be touched from this repo. Auth is ADC, picked up from
        # GOOGLE_APPLICATION_CREDENTIALS exported by the auth step above.
        run: firebase deploy --only hosting:dfp-imdb-browser --project "$PROJECT_ID" --non-interactive
